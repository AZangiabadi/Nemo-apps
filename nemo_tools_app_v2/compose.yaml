name: nemo-tools-hub

x-app: &app
  build:
    context: ..
    dockerfile: refactored_nemo_app/Dockerfile
  environment:
    NEMO_DATA_DIR: /app/data
    NEMO_ASSET_DIR: /app/assets
    NEMO_ENV: ${NEMO_ENV:-production}
    NEMO_BASE_URL: ${NEMO_BASE_URL:-https://nemo.cni.columbia.edu}
    NEMO_TIMEZONE: ${NEMO_TIMEZONE:-America/New_York}
    NEMO_APP_ACCESS_PASSWORD: ${NEMO_APP_ACCESS_PASSWORD:?Set NEMO_APP_ACCESS_PASSWORD in .env}
    NEMO_FLASK_SECRET_KEY: ${NEMO_FLASK_SECRET_KEY:?Set NEMO_FLASK_SECRET_KEY in .env}
    NEMO_JOB_SECRET_KEY: ${NEMO_JOB_SECRET_KEY:?Set NEMO_JOB_SECRET_KEY in .env}
    NEMO_JUMBOTRON_API_TOKEN: ${NEMO_JUMBOTRON_API_TOKEN:-}
    NEMO_JUMBOTRON_REFRESH_SECONDS: ${NEMO_JUMBOTRON_REFRESH_SECONDS:-15}
    NEMO_JUMBOTRON_CACHE_SECONDS: ${NEMO_JUMBOTRON_CACHE_SECONDS:-15}
    NEMO_JUMBOTRON_SCROLL_STEP_PX: ${NEMO_JUMBOTRON_SCROLL_STEP_PX:-1}
    NEMO_JUMBOTRON_SCROLL_INTERVAL_MS: ${NEMO_JUMBOTRON_SCROLL_INTERVAL_MS:-50}
    NEMO_METADATA_CACHE_SECONDS: ${NEMO_METADATA_CACHE_SECONDS:-21600}
    NEMO_OUTPUT_RETENTION_DAYS: ${NEMO_OUTPUT_RETENTION_DAYS:-14}
    NEMO_JOB_STALE_SECONDS: ${NEMO_JOB_STALE_SECONDS:-3600}
  volumes:
    - ./data:/app/data
  restart: unless-stopped

services:
  web:
    <<: *app
    command:
      - gunicorn
      - --bind=0.0.0.0:8000
      - --workers=2
      - --threads=4
      - --timeout=60
      - nemo_app.web.app:create_app()
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    <<: *app
    command: ["nemo-tools-worker"]

  proxy:
    image: caddy:2.10.0-alpine
    depends_on:
      web:
        condition: service_healthy
    environment:
      TOOLS_NEMO_DOMAIN: ${TOOLS_NEMO_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
