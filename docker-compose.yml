services:
  nemo-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: general-usage-nemo-app:latest
    container_name: general-usage-nemo-app
    expose:
      - "8000"
    environment:
      PORT: "8000"
      NEMO_JUMBOTRON_API_TOKEN: ${NEMO_JUMBOTRON_API_TOKEN:-}
      NEMO_JUMBOTRON_REFRESH_SECONDS: ${NEMO_JUMBOTRON_REFRESH_SECONDS:-15}
      NEMO_JUMBOTRON_SCROLL_STEP_PX: ${NEMO_JUMBOTRON_SCROLL_STEP_PX:-1}
      NEMO_JUMBOTRON_SCROLL_INTERVAL_MS: ${NEMO_JUMBOTRON_SCROLL_INTERVAL_MS:-50}
    volumes:
      - ./generated_invoices:/app/generated_invoices
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: nemo-app-caddy
    depends_on:
      - nemo-app
    ports:
      - "80:80"
      - "443:443"
    environment:
      TOOLS_NEMO_DOMAIN: ${TOOLS_NEMO_DOMAIN:-toolsnemo.cni.columbia.edu}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
